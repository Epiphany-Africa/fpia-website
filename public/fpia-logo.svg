<svg width="800" height="800" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="goldRing" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#f5d78e"/>
    <stop offset="30%" stop-color="#c9a14d"/>
    <stop offset="60%" stop-color="#a07828"/>
    <stop offset="80%" stop-color="#c9a14d"/>
    <stop offset="100%" stop-color="#8a6020"/>
  </radialGradient>
  <radialGradient id="goldInner" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#e8c97a"/>
    <stop offset="40%" stop-color="#b8892a"/>
    <stop offset="100%" stop-color="#7a5818"/>
  </radialGradient>
  <radialGradient id="diskGrad" cx="50%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#1e2f50"/>
    <stop offset="50%" stop-color="#111d38"/>
    <stop offset="100%" stop-color="#080f22"/>
  </radialGradient>
  <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f0d47a"/>
    <stop offset="50%" stop-color="#c9a14d"/>
    <stop offset="100%" stop-color="#a07828"/>
  </linearGradient>
  <polygon id="star" points="0,-6 1.4,-2 5.7,-1.9 2.4,1 3.5,5.6 0,3.2 -3.5,5.6 -2.4,1 -5.7,-1.9 -1.4,-2"/>
</defs>

<!-- Background -->
<rect width="680" height="680" fill="#080f22"/>

<!-- Outer glow -->
<circle cx="340" cy="340" r="295" fill="#c9a14d" opacity="0.12"/>
<circle cx="340" cy="340" r="290" fill="#c9a14d" opacity="0.08"/>

<!-- Outermost gold ring -->
<circle cx="340" cy="340" r="280" fill="url(#goldRing)" stroke="#8a6020" stroke-width="0.5"/>
<circle cx="340" cy="340" r="268" fill="#0a1428"/>
<circle cx="340" cy="340" r="262" fill="url(#goldInner)" stroke="#f5d78e" stroke-width="0.3"/>
<circle cx="340" cy="340" r="250" fill="url(#diskGrad)"/>

<!-- Inner decorative rings -->
<circle cx="340" cy="340" r="196" fill="none" stroke="url(#goldText)" stroke-width="1.5"/>
<circle cx="340" cy="340" r="190" fill="none" stroke="url(#goldText)" stroke-width="0.5" opacity="0.6"/>

<!-- TOP ARC text path -->
<path id="topArc" d="M 110,340 a 230,230 0 1,1 460,0" fill="none"/>
<text font-family="Georgia, serif" font-size="18" font-weight="700" fill="#c9a14d" letter-spacing="3.5">
  <textPath href="#topArc" startOffset="50%" text-anchor="middle">• FAIR PROPERTIES INSPECTION AUTHORITY •</textPath>
</text>

<!-- BOTTOM ARC text path -->
<path id="bottomArc" d="M 118,340 a 222,222 0 0,0 444,0" fill="none"/>
<text font-family="Georgia, serif" font-size="17" font-weight="600" fill="#c9a14d" letter-spacing="5">
  <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">• ACCOUNTABILITY BUILT IN •</textPath>
</text>

<!-- LEFT LAUREL BRANCH -->
<g transform="translate(148, 340)" stroke="#c9a14d" stroke-width="1.2" fill="none">
  <path d="M 0,0 Q -8,-15 -14,-35" stroke-width="1"/>
  <ellipse cx="-4" cy="-8" rx="7" ry="4" transform="rotate(-40,-4,-8)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-7" cy="-16" rx="7" ry="4" transform="rotate(-50,-7,-16)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-10" cy="-24" rx="6" ry="3.5" transform="rotate(-60,-10,-24)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-12" cy="-31" rx="5.5" ry="3" transform="rotate(-65,-12,-31)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="2" cy="-9" rx="7" ry="4" transform="rotate(20,2,-9)" fill="#c9a14d" opacity="0.7"/>
  <ellipse cx="0" cy="-18" rx="6.5" ry="3.5" transform="rotate(15,0,-18)" fill="#c9a14d" opacity="0.7"/>
  <ellipse cx="-2" cy="-26" rx="6" ry="3" transform="rotate(10,-2,-26)" fill="#c9a14d" opacity="0.7"/>
</g>

<!-- RIGHT LAUREL BRANCH -->
<g transform="translate(532, 340) scale(-1,1)" stroke="#c9a14d" stroke-width="1.2" fill="none">
  <path d="M 0,0 Q -8,-15 -14,-35" stroke-width="1"/>
  <ellipse cx="-4" cy="-8" rx="7" ry="4" transform="rotate(-40,-4,-8)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-7" cy="-16" rx="7" ry="4" transform="rotate(-50,-7,-16)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-10" cy="-24" rx="6" ry="3.5" transform="rotate(-60,-10,-24)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="-12" cy="-31" rx="5.5" ry="3" transform="rotate(-65,-12,-31)" fill="#c9a14d" opacity="0.85"/>
  <ellipse cx="2" cy="-9" rx="7" ry="4" transform="rotate(20,2,-9)" fill="#c9a14d" opacity="0.7"/>
  <ellipse cx="0" cy="-18" rx="6.5" ry="3.5" transform="rotate(15,0,-18)" fill="#c9a14d" opacity="0.7"/>
  <ellipse cx="-2" cy="-26" rx="6" ry="3" transform="rotate(10,-2,-26)" fill="#c9a14d" opacity="0.7"/>
</g>

<!-- HOUSE ICON -->
<g transform="translate(340, 295)">
  <polygon points="-55,-14 0,-66 55,-14" fill="none" stroke="#c9a14d" stroke-width="3" stroke-linejoin="round"/>
  <path d="M -42,-14 L -42,46 L 42,46" fill="none" stroke="#c9a14d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M -20,18 L -2,36 L 30,-4" fill="none" stroke="#c9a14d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Divider line -->
<line x1="230" y1="372" x2="450" y2="372" stroke="#c9a14d" stroke-width="1" opacity="0.7"/>

<!-- Fair Property Certified -->
<text x="340" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#c9a14d" letter-spacing="1">Fair Property Certified&#x2122;</text>

<!-- 5 Stars -->
<use href="#star" transform="translate(292,440) scale(0.9)" fill="#c9a14d"/>
<use href="#star" transform="translate(316,440) scale(0.9)" fill="#c9a14d"/>
<use href="#star" transform="translate(340,440) scale(0.9)" fill="#c9a14d"/>
<use href="#star" transform="translate(364,440) scale(0.9)" fill="#c9a14d"/>
<use href="#star" transform="translate(388,440) scale(0.9)" fill="#c9a14d"/>

<!-- Tick marks -->
<g stroke="#c9a14d" stroke-width="1" opacity="0.5">
  <line x1="340" y1="62" x2="340" y2="72"/>
  <line x1="340" y1="608" x2="340" y2="618"/>
  <line x1="62" y1="340" x2="72" y2="340"/>
  <line x1="608" y1="340" x2="618" y2="340"/>
  <line x1="142" y1="122" x2="149" y2="130"/>
  <line x1="538" y1="122" x2="531" y2="130"/>
  <line x1="142" y1="558" x2="149" y2="550"/>
  <line x1="538" y1="558" x2="531" y2="550"/>
</g>
</svg>
